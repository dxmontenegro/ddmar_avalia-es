<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Avaliações Bimestrais</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
    }

    .topo {
        background-color: #ff6600;
        color: white;
        padding: 20px 10px;
    }

    .logo {
        width: 120px;
        margin-bottom: 10px;
    }

    .titulo {
        font-size: 22px;
        font-weight: bold;
    }

    .subtitulo {
        font-size: 16px;
        margin-top: 5px;
    }

    .box {
        margin-top: 40px;
    }

    input {
        padding: 12px;
        font-size: 18px;
        width: 260px;
        text-transform: uppercase;
        border-radius: 5px;
        border: 1px solid #ccc;
        text-align: center;
    }

    button {
        padding: 12px 20px;
        font-size: 18px;
        margin-left: 10px;
        cursor: pointer;
        border: none;
        background-color: #ff6600;
        color: white;
        border-radius: 5px;
    }

    iframe {
        margin-top: 20px;
        width: 100%;
        height: 900px;
        border: none;
        display: none;
    }

    .info {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #333;
        display: none;
    }
</style>
</head>

<body>

<div class="topo">
    <img src="imagem1.png" class="logo">
    <div class="titulo">EEMTI DRAGÃO DO MAR</div>
    <div class="subtitulo">AVALIAÇÕES BIMESTRAIS - 1ª ETAPA 2026</div>
</div>

<div class="box">
    <p><strong>DIGITE O CÓDIGO DA PROVA</strong></p>
    <input type="text" id="codigo">
    <button onclick="acessarProva()">Acessar</button>
</div>

<div id="infoProva" class="info"></div>

<iframe id="frameProva"></iframe>

<script>
function acessarProva() {
    let input = document.getElementById("codigo");
    let codigo = input.value.toUpperCase().trim();

    const provas = {

        // 🔹 1º ANO
        "DMAR1MAT1": "https://docs.google.com/forms/d/e/1FAIpQLSel6_ekoikgL-WvTB0yC59m77YOnn0WG8qYxMeGYHw3BGXHag/viewform?embedded=true",
        "DMAR1NAT1": "",
        "DMAR1HUM1": "",
        "DMAR1LIN1": "",

        // 🔹 2º ANO
        "DMAR2MAT1": "",
        "DMAR2NAT1": "",
        "DMAR2HUM1": "",
        "DMAR2LIN1": "",

        // 🔹 3º ANO
        "DMAR3MAT1": "",
        "DMAR3NAT1": "",
        "DMAR3HUM1": "",
        "DMAR3LIN1": ""
    };

    let serie = codigo.charAt(4);
    let area = codigo.substring(5,8);
    let bimestre = codigo.charAt(8);

    let nomeSerie = {
        "1": "1º Ano",
        "2": "2º Ano",
        "3": "3º Ano"
    };

    let nomeArea = {
        "MAT": "Matemática",
        "NAT": "Ciências da Natureza",
        "HUM": "Ciências Humanas",
        "LIN": "Linguagens"
    };

    if (provas[codigo] && provas[codigo] !== "") {

        // 🔹 Mostra info da prova
        document.getElementById("infoProva").innerHTML =
            nomeSerie[serie] + " - " +
            nomeArea[area] + " - " +
            bimestre + "º Bimestre";

        document.getElementById("infoProva").style.display = "block";

        // 🔹 Substitui o código por mensagem
        input.value = "BOA SORTE !";
        input.disabled = true;

        // 🔹 Carrega prova
        let frame = document.getElementById("frameProva");
        frame.src = provas[codigo];
        frame.style.display = "block";

    } else {
        alert("Código inválido ou prova não disponível.");
    }
}
</script>

</body>
</html>
